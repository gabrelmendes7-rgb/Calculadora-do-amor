<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body> 
    <main class="calculadora">
        <div id="visor">0</div>
        <div class="grid-botoes">
                <button onclick="limpar_tudo()">LT</button>
                <button onclick="limpar_ultimo()">LU</button>
                <button onclick="insere_visor('%')">%</button>
                <button onclick="insere_visor('/')">/</button>
                <button onclick="insere_visor('*')">x</button>
                <button onclick="insere_visor('1')">1</button>
                <button onclick="insere_visor('2')">2</button>
                <button onclick="insere_visor('3')">3</button>
                <button onclick="insere_visor('4')">4</button>
                <button onclick="insere_visor('+')">+</button>
                <button onclick="insere_visor('5')">5</button>
                <button onclick="insere_visor('6')">6</button>
                <button onclick="insere_visor('7')">7</button>
                <button onclick="insere_visor('8')">8</button>
                <button onclick="insere_visor('-')">-</button>
                <button onclick="insere_visor('9')">9</button>
                <button onclick="insere_visor('0')">0</button>
                <button onclick="insere_visor('.')">.</button>
                <button class="igual" onclick="calcular(resultado_visor)">=</button>
        </div>
    </main>      
</body>
</html>
