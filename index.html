<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Calculadora portátil</h1>
    </header>
    
    <main class="calculadora">
        <label><div class="visor">0</div></label>
        <div class="linha linha1">
            <button>LT</button>
            <button>L</button>
            <button>%</button>
            <button>/</button>
            <button>X</button>
        </div>

        <div class="linha linha2">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>+</button>
        </div>

        <div class="linha linha3">
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>-</button>
        </div>

        <div class="linha linha4">
            <button>9</button>
            <button>0</button>
            <button>.</button>
            <button id="igual">=</button>
        </div>
    </main>      
</body>
</html>
